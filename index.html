<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Activity</title>

    <style>

        h1 {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;        
            margin-bottom: 30px;
        }

        span {
            display: block;
            margin-bottom: 20px;
             background: linear-gradient(to right, #4969cb, #09dbe7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0e2647;

        }

        #rememberMe{
            margin-top: 10px;
            width: 18px;
            height: 18px;
            float: left;
        }

        .rounded {
            border-radius: 50%;
        }

        .checkbox {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            margin-left: 8px;
            color: rgba(0, 0, 0, 0.659);
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .chicken {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
            color: rgba(128, 128, 128, 0.659);
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            border-radius: 15px;
            width: 100%;
            max-width: 320px;
            padding: 10px;
            margin: 0 auto 20px;
            display: block;
        }


        
        hr{
            margin-top: 20px;
        }

        .button-row {
            display: flex;
            gap: 40px;
            margin-bottom: 10px;
        }
        button[type="submit"],
        input[type="reset"] {
            font-weight: bold;
            margin-top: 10px;
            flex: 1;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
        }
        button[type="submit"] {
            background-color: #0e2647;
            color: white;
        }
        input[type="reset"] {
            background-color: #fff;
            color: #848383;
        }
        .forgot {
            text-align: center;
            margin-top: 10px;
            font-size: larger;
            font-weight: bold;
            margin-top: 15px;
        }

        .forgot a {
            text-decoration: none;
            color: #26a3f1;
        }

        form {
            background-color: white;
            padding: 50px;
            width: 360px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

    </style>


</head>
<body>
    


    
    <form onsubmit="authenticate(event)" id="loginForm">
        <img src="240_F_1114151666_hVky5499PWOaeqzgwKduGk7UCnQeDAjo.jpg" class="rounded" style="width: 150px; height: 150px; display: block; margin: 0 auto 20px; box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.3);">
        <span>
            <h1>Login</h1>
        </span>
        <label class="chicken"> Username </label>
        <i><input type="text" id="username" required placeholder="Enter Username" style="text-align: center;">
        
        <label class="chicken"> Password </label>
        <input type="password" id="password" required placeholder="Enter Password" style="text-align: center;">
        <div>
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe" class="checkbox">Stay Logged In</label>
        </div>
        <div class="button-row">
            <button type="submit">Login</button>
            <input type="reset" value="Cancel">
        </div>
        <hr>
        <div id="InvalidAttempt"></div>
        <p class="forgot"><a href="#">Forgot username / password?</a></p>
    </form>

    <script>
        let attemptCount = 0;
    const maxAttempts = 3;

    function authenticate(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const message = document.getElementById("InvalidAttempt");
        const button = document.querySelector('#loginForm button[type="submit"]');

        
        if (button.disabled) return;

        if (username === 'janedoe' && password === '1234') {
            alert("Welcome " + username + "!");
            attemptCount = 0;
            message.innerHTML = "";
            window.location.href = 'notebooks.html';
            return;
        }

        attemptCount++;
        message.innerHTML = `Incorrect username and/or password. Attempt ${attemptCount} of ${maxAttempts}.`;

        if (attemptCount >= maxAttempts) {
            button.disabled = true;
            message.innerHTML = "Too many failed attempts. Try again in 3 seconds.";

            setTimeout(function () {
                attemptCount = 0;
                button.disabled = false;
                message.innerHTML = "";
            }, 3000);
        }
    }
    </script>


</body>
</html>
